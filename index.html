<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cloud Vocab Notebook</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* 1. THE FIX: Forces padding to stay inside the element's width */
        * { box-sizing: border-box; }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: #333; 
            padding: 10px; 
            margin: 0; 
            min-height: 100vh; 
        }
        
        .container { 
            max-width: 500px; 
            width: 100%; /* Ensures it doesn't stretch past the screen */
            margin: auto; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            padding: 20px 15px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            overflow: hidden; /* Prevents anything from spilling out */
        }
        
        h2 { 
            color: #2d3748; 
            text-align: center; 
            margin-top: 0; 
            font-weight: 600; 
            margin-bottom: 15px; 
            font-size: 1.4em; 
        }
        
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; width: 100%; }
        
        .input-row { display: flex; gap: 8px; width: 100%; }
        
        /* THE FLEXBOX FIX: min-width: 0 stops the input from pushing the button out */
        .input-row input { flex: 1; min-width: 0; }

        input { 
            padding: 12px; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            font-size: 16px; 
            font-family: 'Poppins', sans-serif; 
            transition: border-color 0.3s ease; 
            outline: none; 
            width: 100%;
        }
        input:focus { border-color: #667eea; }

        button#magic-btn {
            background: #f0f4f8; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 18px; 
            cursor: pointer; padding: 0 12px; transition: transform 0.2s ease, background 0.2s ease;
            flex-shrink: 0; /* Prevents the button itself from getting squished */
        }
        button#magic-btn:hover { background: #e2e8f0; transform: scale(1.05); }
        button#magic-btn:active { transform: scale(0.95); }

        button#add-btn { 
            padding: 12px; 
            background: linear-gradient(to right, #667eea, #764ba2); 
            color: white; border: none; border-radius: 10px; font-size: 16px; 
            font-weight: 600; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; 
            width: 100%;
        }
        button#add-btn:active { transform: scale(0.96); }

        ul { list-style: none; padding: 0; margin: 0; width: 100%; }
        
        li { 
            background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; 
            margin-bottom: 10px; padding: 12px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.02); animation: fadeIn 0.4s ease forwards; 
            width: 100%;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .word-content { flex: 1; padding-right: 10px; overflow-wrap: anywhere; } /* Prevents super long words from breaking layout */
        .word-text { font-weight: 600; color: #667eea; display: block; font-size: 1.05em; margin-bottom: 2px; }
        
        .delete-btn { 
            background-color: #ffe1e1; color: #ff4d4d; border: none; 
            padding: 8px; 
            border-radius: 8px; cursor: pointer; font-size: 14px; 
            display: flex; align-items: center; justify-content: center; transition: background-color 0.2s ease; 
            flex-shrink: 0;
        }
        .delete-btn:active { background-color: #ffcccc; }
    </style>
</head>
<body>

<div class="container">
    <h2>Vocab Tracker 📖</h2>
    <div class="input-group">
        <div class="input-row">
            <input type="text" id="wordInput" placeholder="New word...">
            <button id="magic-btn" title="Auto-fill definition">✨</button>
        </div>
        <input type="text" id="defInput" placeholder="Definition...">
        <button id="add-btn">Add to Cloud</button>
    </div>
    <ul id="vocabList"></ul>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { initializeFirestore, persistentLocalCache, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 🚨🚨🚨 REPLACE THIS ENTIRE BLOCK WITH YOUR ACTUAL FIREBASE KEYS 🚨🚨🚨
    const firebaseConfig = {
        apiKey: "AIzaSyBXAEDFZxLSSDpSqgmrYdNBEGnuJ32Fxao",
        authDomain: "vocabtracker-635f7.firebaseapp.com",
        projectId: "vocabtracker-635f7",
        storageBucket: "vocabtracker-635f7.firebasestorage.app",
        messagingSenderId: "4191928958",
        appId: "1:4191928958:web:abe7b8c0e68befcb790e2f"
    };
    // 🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { localCache: persistentLocalCache() });

    const vocabList = document.getElementById('vocabList');
    const wordInput = document.getElementById('wordInput');
    const defInput = document.getElementById('defInput');
    const addBtn = document.getElementById('add-btn');
    const magicBtn = document.getElementById('magic-btn'); 

    document.addEventListener('DOMContentLoaded', getWords);
    addBtn.addEventListener('click', addWord);
    magicBtn.addEventListener('click', fetchDefinition); 

    async function fetchDefinition() {
        const word = wordInput.value.trim(); 
        if (word === '') {
            alert("Please type a word first before clicking the magic button!");
            return;
        }

        magicBtn.innerText = "⏳";
        defInput.placeholder = "Searching dictionary...";
        defInput.value = ""; 

        try {
            const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
            if (!response.ok) throw new Error("Word not found");
            const data = await response.json();
            const definition = data[0].meanings[0].definitions[0].definition;
            defInput.value = definition;
        } catch (error) {
            console.error("Dictionary API Error:", error);
            alert("Oops! Couldn't find a definition for that exact word. You might need to type it in manually.");
        }

        magicBtn.innerText = "✨";
        defInput.placeholder = "Definition...";
    }

    async function addWord() {
        if (wordInput.value.trim() === '' || defInput.value.trim() === '') return;
        addBtn.innerText = "Saving..."; 

        try {
            const docRef = await addDoc(collection(db, "vocabWords"), {
                word: wordInput.value,
                definition: defInput.value,
                timestamp: Date.now() 
            });

            createListElement(docRef.id, wordInput.value, defInput.value);
            wordInput.value = '';
            defInput.value = '';
        } catch (error) {
            console.error("Error adding document: ", error);
            alert("Failed to save. Check console.");
        }
        
        addBtn.innerText = "Add to Cloud";
    }

    async function getWords() {
        vocabList.innerHTML = "<li>Loading your words...</li>"; 
        try {
            const q = query(collection(db, "vocabWords"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            vocabList.innerHTML = ""; 
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                createListElement(doc.id, data.word, data.definition);
            });
        } catch (error) {
            console.error("Error getting documents: ", error);
            vocabList.innerHTML = "<li>Error loading data.</li>";
        }
    }

    async function deleteWord(id, liElement) {
        liElement.style.opacity = "0.5"; 
        liElement.style.transform = "scale(0.95)";
        try {
            await deleteDoc(doc(db, "vocabWords", id));
            liElement.remove();
        } catch (error) {
            console.error("Error deleting document: ", error);
            alert("Failed to delete.");
            liElement.style.opacity = "1"; 
            liElement.style.transform = "scale(1)";
        }
    }

    function createListElement(id, wordText, defText) {
        const li = document.createElement('li');
        li.innerHTML = `
            <div class="word-content">
                <span class="word-text">${wordText}</span> 
                <span style="color: #4a5568; font-size: 0.9em;">${defText}</span>
            </div>
        `;
        const delBtn = document.createElement('button');
        delBtn.className = "delete-btn";
        delBtn.innerHTML = "🗑️";
        delBtn.onclick = () => deleteWord(id, li);
        li.appendChild(delBtn);
        vocabList.appendChild(li); 
    }
</script>

</body>
</html>
