<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cloud Vocab Notebook</title>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f4f9; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; margin-top: 0; }
        .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button#add-btn { padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; min-height: 48px; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: #fff; border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .word-content { flex: 1; padding-right: 10px; }
        .word-text { font-weight: bold; color: #007bff; display: block; margin-bottom: 4px; }
        .delete-btn { background-color: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 14px; min-width: 40px; min-height: 40px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Cloud Vocab Tracker ☁️</h2>
    <div class="input-group">
        <input type="text" id="wordInput" placeholder="New word...">
        <input type="text" id="defInput" placeholder="Definition...">
        <button id="add-btn">Add to Cloud</button>
    </div>
    <ul id="vocabList"></ul>
</div>

<script type="module">
    // 1. Import Firebase tools
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 2. YOUR SPECIFIC FIREBASE CONFIGURATION (From your screenshot!)
    const firebaseConfig = {
        apiKey: "AIzaSyBXAEDFZxLSSDpSqgmrYdNBEGnuJ32Fxao",
        authDomain: "vocabtracker-635f7.firebaseapp.com",
        projectId: "vocabtracker-635f7",
        storageBucket: "vocabtracker-635f7.firebasestorage.app",
        messagingSenderId: "4191928958",
        appId: "1:4191928958:web:abe7b8c0e68befcb790e2f"
    };

    // 3. Initialize Firebase and the Database
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 4. UI Elements
    const vocabList = document.getElementById('vocabList');
    const wordInput = document.getElementById('wordInput');
    const defInput = document.getElementById('defInput');
    const addBtn = document.getElementById('add-btn');

    document.addEventListener('DOMContentLoaded', getWords);
    addBtn.addEventListener('click', addWord);

    // --- CLOUD DATABASE FUNCTIONS ---
    async function addWord() {
        if (wordInput.value.trim() === '' || defInput.value.trim() === '') return;
        addBtn.innerText = "Saving..."; 

        try {
            const docRef = await addDoc(collection(db, "vocabWords"), {
                word: wordInput.value,
                definition: defInput.value,
                timestamp: Date.now() 
            });

            createListElement(docRef.id, wordInput.value, defInput.value);
            wordInput.value = '';
            defInput.value = '';
        } catch (error) {
            console.error("Error adding document: ", error);
            alert("Failed to save to cloud. Did you enable Firestore in the console?");
        }
        
        addBtn.innerText = "Add to Cloud";
    }

    async function getWords() {
        vocabList.innerHTML = "<li>Loading your words...</li>"; 
        
        try {
            const q = query(collection(db, "vocabWords"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            
            vocabList.innerHTML = ""; 

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                createListElement(doc.id, data.word, data.definition);
            });
        } catch (error) {
            console.error("Error getting documents: ", error);
            vocabList.innerHTML = "<li>Error loading data. Make sure Firestore is enabled!</li>";
        }
    }

    async function deleteWord(id, liElement) {
        liElement.style.opacity = "0.5"; 
        try {
            await deleteDoc(doc(db, "vocabWords", id));
            liElement.remove();
        } catch (error) {
            console.error("Error deleting document: ", error);
            alert("Failed to delete.");
            liElement.style.opacity = "1"; 
        }
    }

    // --- UI HELPER FUNCTION ---
    function createListElement(id, wordText, defText) {
        const li = document.createElement('li');
        li.innerHTML = `
            <div class="word-content">
                <span class="word-text">${wordText}</span> ${defText}
            </div>
        `;
        
        const delBtn = document.createElement('button');
        delBtn.className = "delete-btn";
        delBtn.innerText = "Delete";
        delBtn.onclick = () => deleteWord(id, li);
        
        li.appendChild(delBtn);
        vocabList.appendChild(li); 
    }
</script>

</body>
</html>
