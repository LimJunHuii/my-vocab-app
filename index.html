<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Vocab Notebook</title>

    <style>
        /* Base Styles */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #f4f4f9; 
            padding: 15px; 
            margin: 0;
        }

        .container { 
            max-width: 500px; 
            margin: auto; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }

        h2 { color: #333; text-align: center; margin-top: 0; }

        /* Mobile-Friendly Inputs */
        .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        
        input { 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 16px; /* Prevents auto-zoom on iPhone */
        }

        button { 
            padding: 12px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer;
            min-height: 48px; /* Easier to tap with thumbs */
        }

        button:active { background-color: #0056b3; transform: scale(0.98); }

        /* List Styles */
        ul { list-style: none; padding: 0; margin-top: 20px; }
        
        li { 
            background: #fff; 
            border-bottom: 1px solid #eee; 
            padding: 15px 0; 
            line-height: 1.4;
        }

        .word-text { font-weight: bold; color: #007bff; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>My Vocab Tracker</h2>
    
    <div class="input-group">
        <input type="text" id="wordInput" placeholder="New word (e.g. Resilient)">
        <input type="text" id="defInput" placeholder="Definition...">
        <button onclick="addWord()">Add to List</button>
    </div>

    <ul id="vocabList"></ul>
</div>

<script>
    const vocabList = document.getElementById('vocabList');
    const wordInput = document.getElementById('wordInput');
    const defInput = document.getElementById('defInput');

    document.addEventListener('DOMContentLoaded', getWords);

    function addWord() {
        if (wordInput.value.trim() === '' || defInput.value.trim() === '') {
            alert("Please fill in both fields!");
            return;
        }

        const vocabEntry = {
            word: wordInput.value,
            definition: defInput.value
        };

        createListElement(vocabEntry);
        saveLocalWord(vocabEntry);

        wordInput.value = '';
        defInput.value = '';
    }

    function createListElement(entry) {
        const li = document.createElement('li');
        li.innerHTML = `<span class="word-text">${entry.word}</span> ${entry.definition}`;
        // Adds newest words to the top of the list
        vocabList.insertBefore(li, vocabList.firstChild);
    }

    function saveLocalWord(entry) {
        let words = localStorage.getItem('words') ? JSON.parse(localStorage.getItem('words')) : [];
        words.push(entry);
        localStorage.setItem('words', JSON.stringify(words));
    }

    function getWords() {
        let words = localStorage.getItem('words') ? JSON.parse(localStorage.getItem('words')) : [];
        // Reverse so that saved items appear in order of newest first
        words.forEach(entry => createListElement(entry));
    }
</script>

</body>
</html>
