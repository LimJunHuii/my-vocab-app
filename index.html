<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cloud Vocab Notebook</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* BASE STYLES */
        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #333; padding: 10px; margin: 0; min-height: 100vh; }
        
        .container { max-width: 500px; width: 100%; margin: auto; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 20px 15px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { color: #2d3748; margin: 0; font-weight: 600; font-size: 1.4em; }
        
        /* TOGGLE STYLES */
        .switch-container { display: flex; align-items: center; gap: 8px; font-size: 0.9em; font-weight: 600; color: #4a5568; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e0; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #667eea; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* INPUT STYLES */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; width: 100%; transition: opacity 0.3s ease; }
        .input-row { display: flex; gap: 8px; width: 100%; }
        .input-row input { flex: 1; min-width: 0; }
        
        /* NEW: Select Dropdown Style */
        select#tagInput { padding: 0 10px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; font-family: 'Poppins', sans-serif; outline: none; background: #fff; flex-shrink: 0; color: #4a5568; font-weight: 600; }
        
        input { padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; font-family: 'Poppins', sans-serif; outline: none; width: 100%; }
        input:focus, select:focus { border-color: #667eea; }

        button#magic-btn { background: #f0f4f8; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 18px; cursor: pointer; padding: 0 12px; flex-shrink: 0; transition: transform 0.2s ease; }
        button#magic-btn:active { transform: scale(0.95); }
        button#add-btn { padding: 12px; background: linear-gradient(to right, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; transition: transform 0.2s ease; }
        button#add-btn:active { transform: scale(0.96); }

        /* NEW: FILTER BAR STYLES */
        .filter-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; } /* Hides scrollbar on iOS */
        .filter-btn { padding: 6px 12px; border-radius: 15px; border: none; font-size: 0.85em; font-weight: 600; cursor: pointer; background: #e2e8f0; color: #4a5568; white-space: nowrap; transition: 0.2s; }
        .filter-btn.active { background: #667eea; color: white; }

        /* LIST & FLASHCARD STYLES */
        ul { list-style: none; padding: 0; margin: 0; width: 100%; }
        li { background: transparent; margin-bottom: 10px; width: 100%; perspective: 1000px; }
        
        .normal-view { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .word-content { flex: 1; padding-right: 10px; overflow-wrap: anywhere; }
        
        /* NEW: Tag Badge Styles */
        .word-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .word-text { font-weight: 600; color: #667eea; font-size: 1.05em; }
        .tag-badge { font-size: 0.7em; padding: 2px 8px; border-radius: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Specific Tag Colors */
        .tag-general { background: #e2e8f0; color: #4a5568; }
        .tag-noun { background: #c6f6d5; color: #22543d; }
        .tag-verb { background: #fed7d7; color: #742a2a; }
        .tag-adjective { background: #feebc8; color: #7b341e; }
        .tag-slang { background: #e9d8fd; color: #44337a; }

        .delete-btn { background-color: #ffe1e1; color: #ff4d4d; border: none; padding: 8px; border-radius: 8px; font-size: 14px; flex-shrink: 0; cursor: pointer; }
        
        .flashcard-view { display: none; height: 120px; width: 100%; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .flashcard-front { background: #fff; color: #667eea; font-weight: 600; font-size: 1.3em; border: 2px solid #e2e8f0; }
        .flashcard-back { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; transform: rotateY(180deg); font-size: 1em; padding: 20px; overflow-y: auto; }

        ul.flashcard-mode .normal-view { display: none; }
        ul.flashcard-mode .flashcard-view { display: block; }
        ul.flashcard-mode li.flipped .flashcard-inner { transform: rotateY(180deg); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Vocab Tracker 📖</h2>
        <div class="switch-container">
            Study Mode
            <label class="switch">
                <input type="checkbox" id="studyToggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="input-group" id="inputContainer">
        <div class="input-row">
            <input type="text" id="wordInput" placeholder="New word...">
            <select id="tagInput">
                <option value="General">General</option>
                <option value="Noun">Noun</option>
                <option value="Verb">Verb</option>
                <option value="Adjective">Adj</option>
                <option value="Slang">Slang</option>
            </select>
            <button id="magic-btn" title="Auto-fill definition">✨</button>
        </div>
        <input type="text" id="defInput" placeholder="Definition...">
        <button id="add-btn">Add to Cloud</button>
    </div>
    
    <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-filter="All">All</button>
        <button class="filter-btn" data-filter="General">General</button>
        <button class="filter-btn" data-filter="Noun">Noun</button>
        <button class="filter-btn" data-filter="Verb">Verb</button>
        <button class="filter-btn" data-filter="Adjective">Adj</button>
        <button class="filter-btn" data-filter="Slang">Slang</button>
    </div>

    <ul id="vocabList"></ul>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { initializeFirestore, persistentLocalCache, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 🚨 PASTE FIREBASE CONFIG HERE 🚨
    const firebaseConfig = {
        apiKey: "AIzaSyBXAEDFZxLSSDpSqgmrYdNBEGnuJ32Fxao",
        authDomain: "vocabtracker-635f7.firebaseapp.com",
        projectId: "vocabtracker-635f7",
        storageBucket: "vocabtracker-635f7.firebasestorage.app",
        messagingSenderId: "4191928958",
        appId: "1:4191928958:web:abe7b8c0e68befcb790e2f"
    };

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { localCache: persistentLocalCache() });

    const vocabList = document.getElementById('vocabList');
    const wordInput = document.getElementById('wordInput');
    const defInput = document.getElementById('defInput');
    const tagInput = document.getElementById('tagInput'); // NEW
    const addBtn = document.getElementById('add-btn');
    const magicBtn = document.getElementById('magic-btn'); 
    const studyToggle = document.getElementById('studyToggle');
    const inputContainer = document.getElementById('inputContainer');
    const filterBtns = document.querySelectorAll('.filter-btn'); // NEW

    document.addEventListener('DOMContentLoaded', getWords);
    addBtn.addEventListener('click', addWord);
    magicBtn.addEventListener('click', fetchDefinition); 

    // --- FILTER LOGIC ---
    filterBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            // 1. Change the visual active state of the buttons
            filterBtns.forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            
            // 2. Hide/Show the list items based on the data-tag
            const filterValue = e.target.getAttribute('data-filter');
            const allItems = vocabList.querySelectorAll('li');
            
            allItems.forEach(li => {
                // If "All" is selected, or if the item's tag matches the filter, show it!
                if (filterValue === 'All' || li.getAttribute('data-tag') === filterValue) {
                    li.style.display = 'block';
                } else {
                    li.style.display = 'none'; // Hide it
                }
            });
        });
    });

    // --- TOGGLE STUDY MODE ---
    studyToggle.addEventListener('change', (e) => {
        if (e.target.checked) {
            vocabList.classList.add('flashcard-mode');
            inputContainer.style.display = 'none'; 
        } else {
            vocabList.classList.remove('flashcard-mode');
            inputContainer.style.display = 'flex'; 
            document.querySelectorAll('.flipped').forEach(card => card.classList.remove('flipped'));
        }
    });

    // --- MERRIAM-WEBSTER API ---
    async function fetchDefinition() {
        const word = wordInput.value.trim(); 
        if (word === '') { alert("Please type a word first!"); return; }

        // 🚨 PASTE DICTIONARY API KEY HERE 🚨
        const MW_API_KEY = "1d689ff1-dfb4-449e-852c-44af6d34cedb"; 

        magicBtn.innerText = "⏳";
        defInput.placeholder = "Searching...";
        defInput.value = ""; 

        try {
            const response = await fetch(`https://www.dictionaryapi.com/api/v3/references/learners/json/${word}?key=${MW_API_KEY}`);
            if (!response.ok) throw new Error("Network response was not ok");
            const data = await response.json();
            if (!data.length || typeof data[0] === 'string') throw new Error("Word not found");
            const definition = data[0].shortdef[0];
            if (definition) defInput.value = definition;
            else throw new Error("No short definition available");
        } catch (error) {
            alert("Oops! Couldn't find a definition.");
        }
        magicBtn.innerText = "✨";
        defInput.placeholder = "Definition...";
    }

    // --- CLOUD DATABASE FUNCTIONS ---
    async function addWord() {
        if (wordInput.value.trim() === '' || defInput.value.trim() === '') return;
        addBtn.innerText = "Saving..."; 

        const selectedTag = tagInput.value; // Grab the selected tag

        try {
            const docRef = await addDoc(collection(db, "vocabWords"), {
                word: wordInput.value,
                definition: defInput.value,
                tag: selectedTag, // Save the tag to the cloud!
                timestamp: Date.now() 
            });
            createListElement(docRef.id, wordInput.value, defInput.value, selectedTag);
            wordInput.value = ''; defInput.value = '';
        } catch (error) {
            alert("Failed to save.");
        }
        addBtn.innerText = "Add to Cloud";
    }

    async function getWords() {
        vocabList.innerHTML = "<li style='text-align:center;'>Loading...</li>"; 
        try {
            const q = query(collection(db, "vocabWords"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            vocabList.innerHTML = ""; 
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                // Ensure old words without tags default to "General"
                const wordTag = data.tag ? data.tag : "General"; 
                createListElement(doc.id, data.word, data.definition, wordTag);
            });
        } catch (error) {
            vocabList.innerHTML = "<li>Error loading data.</li>";
        }
    }

    async function deleteWord(id, liElement) {
        liElement.style.opacity = "0.5"; 
        try {
            await deleteDoc(doc(db, "vocabWords", id));
            liElement.remove();
        } catch (error) {
            alert("Failed to delete.");
            liElement.style.opacity = "1"; 
        }
    }

    function createListElement(id, wordText, defText, tagText) {
        const li = document.createElement('li');
        
        // Add the tag as a "data attribute" so our filter buttons can find it easily
        li.setAttribute('data-tag', tagText); 
        
        // Make sure the CSS class matches the tag (e.g., tag-noun, tag-verb)
        const tagClass = `tag-${tagText.toLowerCase()}`;

        li.innerHTML = `
            <div class="normal-view">
                <div class="word-content">
                    <div class="word-header">
                        <span class="word-text">${wordText}</span>
                        <span class="tag-badge ${tagClass}">${tagText}</span>
                    </div>
                    <span style="color: #4a5568; font-size: 0.9em;">${defText}</span>
                </div>
            </div>
            
            <div class="flashcard-view">
                <div class="flashcard-inner">
                    <div class="flashcard-front">
                        <div style="margin-bottom: 5px;">${wordText}</div>
                        <span class="tag-badge ${tagClass}" style="font-size: 0.5em;">${tagText}</span>
                    </div>
                    <div class="flashcard-back">${defText}</div>
                </div>
            </div>
        `;
        
        const delBtn = document.createElement('button');
        delBtn.className = "delete-btn";
        delBtn.innerHTML = "🗑️";
        delBtn.onclick = (e) => {
            e.stopPropagation(); 
            deleteWord(id, li);
        };
        li.querySelector('.normal-view').appendChild(delBtn);
        
        li.onclick = () => {
            if (vocabList.classList.contains('flashcard-mode')) {
                li.classList.toggle('flipped');
            }
        };

        vocabList.appendChild(li); 
    }
</script>

</body>
</html>
