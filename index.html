<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cloud Vocab Notebook</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #333; padding: 20px 15px; margin: 0; min-height: 100vh; }
        .container { max-width: 500px; margin: auto; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 30px 20px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        h2 { color: #2d3748; text-align: center; margin-top: 0; font-weight: 600; margin-bottom: 25px; }
        
        .input-group { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        
        /* NEW: A row to put the word input and magic button side-by-side */
        .input-row { display: flex; gap: 10px; }
        .input-row input { flex: 1; } /* Makes the input stretch to fill space */

        input { padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; font-family: 'Poppins', sans-serif; transition: border-color 0.3s ease; outline: none; }
        input:focus { border-color: #667eea; }

        /* NEW: Magic Button Styles */
        button#magic-btn {
            background: #f0f4f8; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 20px; 
            cursor: pointer; padding: 0 15px; transition: transform 0.2s ease, background 0.2s ease;
        }
        button#magic-btn:hover { background: #e2e8f0; transform: scale(1.05); }
        button#magic-btn:active { transform: scale(0.95); }

        button#add-btn { padding: 15px; background: linear-gradient(to right, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        button#add-btn:active { transform: scale(0.96); }

        ul { list-style: none; padding: 0; margin: 0; }
        li { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .word-content { flex: 1; padding-right: 15px; }
        .word-text { font-weight: 600; color: #667eea; display: block; font-size: 1.1em; margin-bottom: 2px; }
        .delete-btn { background-color: #ffe1e1; color: #ff4d4d; border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background-color 0.2s ease; }
        .delete-btn:active { background-color: #ffcccc; }
    </style>
</head>
<body>

<div class="container">
    <h2>Vocab Tracker 📖</h2>
    <div class="input-group">
        <div class="input-row">
            <input type="text" id="wordInput" placeholder="New word...">
            <button id="magic-btn" title="Auto-fill definition">✨</button>
        </div>
        <input type="text" id="defInput" placeholder="Definition...">
        <button id="add-btn">Add to Cloud</button>
    </div>
    <ul id="vocabList"></ul>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { initializeFirestore, persistentLocalCache, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 🚨🚨🚨 REPLACE THIS ENTIRE BLOCK WITH YOUR ACTUAL FIREBASE KEYS 🚨🚨🚨
    const firebaseConfig = {
        apiKey: "AIzaSyBXAEDFZxLSSDpSqgmrYdNBEGnuJ32Fxao",
        authDomain: "vocabtracker-635f7.firebaseapp.com",
        projectId: "vocabtracker-635f7",
        storageBucket: "vocabtracker-635f7.firebasestorage.app",
        messagingSenderId: "4191928958",
        appId: "1:4191928958:web:abe7b8c0e68befcb790e2f"
    };
    // 🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨🚨

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { localCache: persistentLocalCache() });

    const vocabList = document.getElementById('vocabList');
    const wordInput = document.getElementById('wordInput');
    const defInput = document.getElementById('defInput');
    const addBtn = document.getElementById('add-btn');
    const magicBtn = document.getElementById('magic-btn'); // New element

    document.addEventListener('DOMContentLoaded', getWords);
    addBtn.addEventListener('click', addWord);
    magicBtn.addEventListener('click', fetchDefinition); // New event listener

    // --- NEW: THE MAGIC DICTIONARY API FUNCTION ---
    async function fetchDefinition() {
        const word = wordInput.value.trim(); // Get the word they typed
        
        if (word === '') {
            alert("Please type a word first before clicking the magic button!");
            return;
        }

        // Give the user visual feedback that we are searching
        magicBtn.innerText = "⏳";
        defInput.placeholder = "Searching dictionary...";
        defInput.value = ""; // Clear any old text

        try {
            // Ask the dictionary API for the word
            const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
            
            // If the API says "404 Not Found", trigger an error
            if (!response.ok) throw new Error("Word not found");

            // Convert the API response into a JavaScript object
            const data = await response.json();
            
            // Dig deep into the API's data structure to find the first definition string
            const definition = data[0].meanings[0].definitions[0].definition;

            // Put the definition into the input box!
            defInput.value = definition;

        } catch (error) {
            console.error("Dictionary API Error:", error);
            alert("Oops! Couldn't find a definition for that exact word. You might need to type it in manually.");
        }

        // Reset the UI back to normal
        magicBtn.innerText = "✨";
        defInput.placeholder = "Definition...";
    }

    // --- EXISTING CLOUD FUNCTIONS ---
    async function addWord() {
        if (wordInput.value.trim() === '' || defInput.value.trim() === '') return;
        addBtn.innerText = "Saving..."; 

        try {
            const docRef = await addDoc(collection(db, "vocabWords"), {
                word: wordInput.value,
                definition: defInput.value,
                timestamp: Date.now() 
            });

            createListElement(docRef.id, wordInput.value, defInput.value);
            wordInput.value = '';
            defInput.value = '';
        } catch (error) {
            console.error("Error adding document: ", error);
            alert("Failed to save. Check console.");
        }
        
        addBtn.innerText = "Add to Cloud";
    }

    async function getWords() {
        vocabList.innerHTML = "<li>Loading your words...</li>"; 
        try {
            const q = query(collection(db, "vocabWords"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            vocabList.innerHTML = ""; 
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                createListElement(doc.id, data.word, data.definition);
            });
        } catch (error) {
            console.error("Error getting documents: ", error);
            vocabList.innerHTML = "<li>Error loading data.</li>";
        }
    }

    async function deleteWord(id, liElement) {
        liElement.style.opacity = "0.5"; 
        liElement.style.transform = "scale(0.95)";
        try {
            await deleteDoc(doc(db, "vocabWords", id));
            liElement.remove();
        } catch (error) {
            console.error("Error deleting document: ", error);
            alert("Failed to delete.");
            liElement.style.opacity = "1"; 
            liElement.style.transform = "scale(1)";
        }
    }

    function createListElement(id, wordText, defText) {
        const li = document.createElement('li');
        li.innerHTML = `
            <div class="word-content">
                <span class="word-text">${wordText}</span> 
                <span style="color: #4a5568; font-size: 0.95em;">${defText}</span>
            </div>
        `;
        const delBtn = document.createElement('button');
        delBtn.className = "delete-btn";
        delBtn.innerHTML = "🗑️";
        delBtn.onclick = () => deleteWord(id, li);
        li.appendChild(delBtn);
        vocabList.appendChild(li); 
    }
</script>

</body>
</html>
